<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══════════════════════════════════════
   LIGHT THEME (default)
═══════════════════════════════════════ */
:root,
[data-theme="light"]{
  --bg:#eee8dc;
  --bg2:#e4ddd0;
  --surface:#ffffff;
  --surface2:#faf7f2;
  --surface3:#f3ede3;
  --border:#ddd5c5;
  --border2:#c9bfad;
  --accent:#b06a2f;
  --accent-light:#f0e0cc;
  --accent2:#d4874a;
  --text:#2c2418;
  --text-muted:#7a6a55;
  --text-dim:#b8a898;
  --green:#4a7c5a;
  --green-light:#e0f0e6;
  --danger:#c0392b;
  --danger-light:#fdecea;
  --blue:#5a7ab5;
  --blue-light:#eef2fc;
  --line-color:#e0d8cc;
  --margin-line:rgba(210,130,100,.30);
  --shadow-sm:0 2px 8px rgba(100,70,30,.08);
  --shadow:0 4px 24px rgba(100,70,30,.13);
  --shadow-lg:0 8px 40px rgba(100,70,30,.20);
  --sidebar-bg:#ffffff;
  --paper-bg:#ffffff;
  --toolbar-bg:#ffffff;
}

/* ═══════════════════════════════════════
   DARK THEME
═══════════════════════════════════════ */
[data-theme="dark"]{
  --bg:#1a1814;
  --bg2:#231f1a;
  --surface:#252119;
  --surface2:#2e2920;
  --surface3:#332e24;
  --border:#3d3628;
  --border2:#4d4535;
  --accent:#d4884c;
  --accent-light:#3a2a18;
  --accent2:#e8a066;
  --text:#e8dfc8;
  --text-muted:#a89878;
  --text-dim:#6a5f4a;
  --green:#5a9a6a;
  --green-light:#1a2e20;
  --danger:#e05a4a;
  --danger-light:#2e1a18;
  --blue:#7090c8;
  --blue-light:#1a2038;
  --line-color:#302b22;
  --margin-line:rgba(180,100,70,.28);
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow-lg:0 8px 40px rgba(0,0,0,.55);
  --sidebar-bg:#1e1b16;
  --paper-bg:#25211a;
  --toolbar-bg:#1e1b16;
}

/* ── TRANSITIONS for smooth theme switch ── */
body,
.sidebar,.editor-area,.editor-toolbar,.editor-paper,
.btn-tool,.btn-new,.search-input,.font-size-select,
.note-item,#noteBody,.paper-top,.lined-body-wrap,
.modal,.sidebar-header{
  transition:background .25s,border-color .25s,color .25s,box-shadow .25s;
}

body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:285px;min-width:285px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;box-shadow:2px 0 16px rgba(0,0,0,.08);z-index:2}
.sidebar-header{padding:20px 18px 14px;border-bottom:1px solid var(--border);background:var(--sidebar-bg)}
.logo{font-family:'Lora',serif;font-size:1.45rem;color:var(--accent);font-weight:700;display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 2px 8px rgba(176,106,47,.35);flex-shrink:0}
.logo-sub{font-size:.67rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-weight:300;margin-top:2px;letter-spacing:.8px}

/* Dark mode toggle in header */
.header-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.dark-toggle{background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;transition:all .2s}
.dark-toggle:hover{border-color:var(--accent);color:var(--accent)}
.dark-toggle .toggle-track{width:28px;height:15px;background:var(--border2);border-radius:20px;position:relative;transition:background .2s}
.dark-toggle .toggle-thumb{width:11px;height:11px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s,background .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
[data-theme="dark"] .dark-toggle .toggle-track{background:var(--accent)}
[data-theme="dark"] .dark-toggle .toggle-thumb{transform:translateX(13px)}

.btn-new{margin:12px 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:10px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:.855rem;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;width:calc(100% - 32px);justify-content:center;box-shadow:0 3px 12px rgba(176,106,47,.35)}
.btn-new:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(176,106,47,.45)}
.search-wrap{padding:0 16px 10px;position:relative}
.search-icon{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
.search-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px 8px 34px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;outline:none;transition:border .2s,box-shadow .2s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(176,106,47,.12)}
.search-input::placeholder{color:var(--text-dim)}
.sidebar-meta{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px}
.notes-count{font-size:.7rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.view-toggle{display:flex;gap:2px;background:var(--bg2);border-radius:7px;padding:3px}
.view-btn{background:none;border:none;border-radius:5px;padding:4px 7px;cursor:pointer;color:var(--text-dim);transition:all .15s;display:flex;align-items:center}
.view-btn.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow-sm)}
.notes-list{flex:1;overflow-y:auto;padding:4px 8px 12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* List mode */
.notes-list.list-mode .note-item{display:flex;flex-direction:column;padding:11px 12px;border-radius:9px;cursor:pointer;margin-bottom:3px;border:1.5px solid transparent;transition:all .18s;position:relative}
.notes-list.list-mode .note-item:hover{background:var(--surface2);border-color:var(--border)}
.notes-list.list-mode .note-item.active{background:var(--accent-light);border-color:var(--accent)}
.notes-list.list-mode .note-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
/* Grid mode */
.notes-list.grid-mode{display:grid;grid-template-columns:1fr 1fr;gap:7px;align-content:start}
.notes-list.grid-mode .empty-sidebar{grid-column:1/-1}
.notes-list.grid-mode .note-item{padding:11px;border-radius:9px;cursor:pointer;border:1.5px solid var(--border);transition:all .18s;background:var(--surface);box-shadow:var(--shadow-sm);min-height:88px;display:flex;flex-direction:column}
.notes-list.grid-mode .note-item:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--border2)}
.notes-list.grid-mode .note-item.active{border-color:var(--accent);background:var(--accent-light)}
.note-item-title{font-size:.855rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.note-item.active .note-item-title{color:var(--accent)}
.note-item-preview{font-size:.74rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;line-height:1.4;flex:1}
.note-item-date{font-size:.66rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:5px}
.note-item-tag{display:inline-block;background:var(--accent-light);color:var(--accent);border-radius:20px;padding:1px 6px;font-size:.63rem;font-family:'JetBrains Mono',monospace;margin-top:4px;margin-right:3px}
.empty-sidebar{text-align:center;padding:36px 14px;color:var(--text-dim);font-size:.83rem;font-style:italic;line-height:1.6}

/* ── EDITOR AREA ── */
.editor-area{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg)}
.editor-toolbar{padding:9px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;background:var(--toolbar-bg);box-shadow:0 1px 8px rgba(0,0,0,.06);min-height:52px;flex-wrap:wrap}
.toolbar-spacer{flex:1}
.btn-tool{background:none;border:1.5px solid var(--border);border-radius:7px;padding:5px 10px;color:var(--text-muted);cursor:pointer;font-size:.77rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-tool:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.btn-tool.save{border-color:var(--green);color:var(--green)}
.btn-tool.save:hover{background:var(--green-light)}
.btn-tool.export{border-color:var(--blue);color:var(--blue)}
.btn-tool.export:hover{background:var(--blue-light)}
.btn-tool.danger{border-color:var(--danger);color:var(--danger)}
.btn-tool.danger:hover{background:var(--danger-light)}
.btn-tool:disabled{opacity:.45;cursor:not-allowed}
.btn-tool.active-fmt{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.saved-badge{font-size:.7rem;color:var(--green);font-family:'JetBrains Mono',monospace;opacity:0;transition:opacity .4s;display:flex;align-items:center;gap:4px}
.saved-badge.show{opacity:1}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0}
.font-size-select{background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:4px 7px;color:var(--text-muted);font-size:.77rem;font-family:'Plus Jakarta Sans',sans-serif;outline:none;cursor:pointer;transition:border .2s}
.font-size-select:focus,.font-size-select:hover{border-color:var(--accent);color:var(--text)}

/* ── EDITOR SCROLL AREA ── */
.editor-content{
  flex:1;overflow-y:auto;
  /* neutral background, paper floats on top */
  background:var(--bg);
  padding:32px 40px 60px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}

/* ══════════════════════════════════════════════
   A4 PAPER
   A4 = 210mm × 297mm  @  96dpi → 794px × 1123px
   We display at a slightly smaller scale for the screen
   but keep the exact aspect ratio.
   Width  = 740px (fits well in most screens)
   Height = 740 × (297/210) = ~1047px per "page"
   We don't hard-clip — the paper just grows naturally,
   but we size it at 740px wide = A4 proportion.
══════════════════════════════════════════════ */
.editor-paper{
  background:var(--paper-bg);
  width:740px;
  max-width:100%;
  margin:0 auto;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  border-radius:4px; /* slight rounding, more "paper" feel */
  overflow:hidden;
  /* Minimum one full A4 page tall */
  min-height:1047px;
  position:relative;
}

/* Subtle page-break lines every A4 height after the first */
.editor-paper::after{
  content:'';
  position:absolute;
  left:0;right:0;top:0;bottom:0;
  background-image:repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 1046px,
    var(--border) 1046px,
    var(--border) 1047px
  );
  pointer-events:none;
  z-index:0;
}

/* Title area — A4 margins: 25mm top, 20mm left/right → ~94px top, ~75px sides */
.paper-top{
  position:relative;z-index:1;
  padding:40px 60px 16px 96px; /* left=96 to be past margin line */
}
.title-input{
  width:100%;background:none;border:none;outline:none;
  font-family:'Lora',serif;font-size:2rem;color:var(--text);
  line-height:1.25;margin-bottom:10px;resize:none;overflow:hidden;font-weight:700;
  caret-color:var(--accent);
}
.title-input::placeholder{color:var(--text-dim);font-weight:400;font-style:italic}
.meta-row{
  display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;
  padding-bottom:14px;border-bottom:2px solid var(--accent-light);
}
.meta-date{font-size:.71rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);padding:3px 9px;border-radius:20px;white-space:nowrap}
.tag-input-wrap{display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex:1}
.tag{background:var(--accent-light);border:1px solid var(--border2);border-radius:20px;padding:2px 8px;font-size:.67rem;color:var(--accent);font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px}
.tag:hover{background:var(--danger-light);border-color:var(--danger);color:var(--danger)}
.tag-input{background:none;border:none;outline:none;font-size:.71rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;width:110px}
.tag-input::placeholder{color:var(--text-dim)}

/* ═══════════════════════════════════════════════
   LINED PAPER BODY
   
   Technique: background drawn ON #noteBody itself.
   - line-height = 36px (one line = one grid unit)
   - background-size: 100% 36px (one repeat = one line)
   - background-position: 0 0 (starts at very top of padding)
   - padding-top: 0  → first stripe bottom is at y=35px
     which is exactly under the first text line baseline
   - background-attachment: local → scrolls with content

   Left margin: 96px from paper edge (matches paper-top padding)
   Red margin line sits at x=60px from lined-body-wrap left edge
   lined-body-wrap has padding-left:96px, so red line is at
   paper x = 60px → inside the margin area
═══════════════════════════════════════════════ */
.lined-body-wrap{
  position:relative;z-index:1;
  /* match left padding of paper-top so text aligns */
  padding:0 60px 60px 96px;
}

/* Red margin line */
.lined-body-wrap::before{
  content:'';
  position:absolute;
  /* 72px from wrap left = 72px from content left edge = inside margin */
  left:72px;top:0;bottom:0;width:1.5px;
  background:var(--margin-line);
  pointer-events:none;
}

#noteBody{
  width:100%;
  min-height:900px;
  padding:0;
  outline:none;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:1rem;
  color:var(--text);
  line-height:36px;
  font-weight:300;
  word-break:break-word;
  caret-color:var(--accent);

  /* Lines drawn on the element itself — perfectly in sync with text */
  background-image:repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 35px,
    var(--line-color) 35px,
    var(--line-color) 36px
  );
  background-size:100% 36px;
  background-position:0 0;
  background-attachment:local;
}
#noteBody:empty::before{
  content:attr(data-placeholder);
  color:var(--text-dim);font-style:italic;pointer-events:none;
  display:block;line-height:36px;
}
/* All block children must NOT add margin/padding that breaks line sync */
#noteBody p,
#noteBody div{margin:0;line-height:36px;min-height:36px}
#noteBody ul,
#noteBody ol{padding-left:1.5em;margin:0}
#noteBody li{line-height:36px;margin:0}
#noteBody br{display:block}
/* Inline font-size spans — keep line-height locked */
#noteBody [data-size="small"] {font-size:.85rem;line-height:36px}
#noteBody [data-size="normal"]{font-size:1rem;  line-height:36px}
#noteBody [data-size="large"] {font-size:1.2rem;line-height:36px}
#noteBody [data-size="xlarge"]{font-size:1.5rem;line-height:36px}

/* ── WELCOME ── */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px}
.welcome-art{width:84px;height:84px;background:linear-gradient(135deg,var(--accent-light),var(--surface));border-radius:22px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin-bottom:4px;box-shadow:var(--shadow)}
.welcome h2{font-family:'Lora',serif;font-size:1.6rem;color:var(--text-muted);font-weight:600}
.welcome p{font-size:.87rem;color:var(--text-dim);max-width:270px;line-height:1.7}
.welcome-shortcuts{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.shortcut-badge{font-size:.68rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 9px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:30px 28px;max-width:370px;width:90%;box-shadow:var(--shadow-lg);transform:translateY(12px) scale(.97);transition:transform .22s,background .25s,border-color .25s}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-icon{font-size:1.7rem;margin-bottom:8px}
.modal h3{font-family:'Lora',serif;font-size:1.15rem;margin-bottom:7px;font-weight:600;color:var(--text)}
.modal p{font-size:.84rem;color:var(--text-muted);margin-bottom:22px;line-height:1.6}
.modal-buttons{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:8px 18px;color:var(--text-muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.855rem;font-weight:500;transition:all .15s}
.btn-cancel:hover{border-color:var(--border2);color:var(--text)}
.btn-confirm-delete{background:var(--danger);border:none;border-radius:8px;padding:8px 18px;color:#fff;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.855rem;font-weight:600;transition:background .15s}
.btn-confirm-delete:hover{opacity:.88}

/* ═══════════════════════════════════════════════
   PDF TEMPLATE
   Mirrors the on-screen paper exactly.
   Width matches A4 (794px at 96dpi).
   Uses the same fonts, line-height, lined background,
   margin line, and title/meta layout as the editor.
═══════════════════════════════════════════════ */
#pdfContent{
  display:none;
  width:794px;           /* A4 at 96dpi */
  background:#ffffff;
  font-family:'Plus Jakarta Sans',sans-serif;
  color:#2c2418;
}
.pdf-paper-top{
  padding:40px 60px 16px 96px;
}
#pdfContent h1{
  font-family:'Lora',serif;font-size:28px;font-weight:700;
  color:#2c2418;line-height:1.2;margin-bottom:10px;
}
.pdf-meta-row{
  display:flex;flex-wrap:wrap;gap:8px;
  padding-bottom:12px;
  border-bottom:2px solid #f0e0cc;
  margin-bottom:0;
}
.pdf-meta-chip{
  font-size:10px;color:#b8a898;font-family:'Courier New',monospace;
  background:#faf7f2;border:1px solid #ddd5c5;
  padding:2px 8px;border-radius:20px;white-space:nowrap;
}
.pdf-tag{
  display:inline-block;background:#f0e0cc;color:#b06a2f;
  border-radius:20px;padding:2px 9px;font-size:9px;
  font-family:'Courier New',monospace;
}
/* Lined body in PDF */
.pdf-lined-wrap{
  position:relative;
  padding:0 60px 60px 96px;
}
/* red margin line in PDF */
.pdf-lined-wrap::before{
  content:'';position:absolute;
  left:72px;top:0;bottom:0;width:1.5px;
  background:rgba(210,130,100,.30);
}
.pdf-body-text{
  font-size:13px;line-height:36px;
  color:#2c2418;font-weight:300;
  font-family:'Plus Jakarta Sans','Helvetica',sans-serif;
  word-break:break-word;
  /* Same lined background as editor */
  background-image:repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 35px,
    #ddd5c5 35px,
    #ddd5c5 36px
  );
  background-size:100% 36px;
  background-position:0 0;
}
.pdf-body-text p,
.pdf-body-text div{margin:0;line-height:36px;min-height:36px}
.pdf-body-text ul,
.pdf-body-text ol{padding-left:1.5em;margin:0}
.pdf-body-text li{line-height:36px;margin:0}

@media(max-width:900px){
  .editor-content{padding:20px 12px 40px}
  .editor-paper{width:100%}
  .paper-top{padding:28px 20px 14px 60px}
  .lined-body-wrap{padding:0 20px 40px 60px}
  .lined-body-wrap::before{left:44px}
  .sidebar{width:240px;min-width:240px}
  .notes-list.grid-mode{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">✍️</div>
      <div>Catatan<div class="logo-sub">// tulis &amp; simpan</div></div>
    </div>
    <div class="header-actions">
      <button class="dark-toggle" onclick="toggleTheme()" title="Mode Malam / Siang">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel">Malam</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </button>
    </div>
  </div>

  <button class="btn-new" onclick="createNote()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Catatan Baru
  </button>

  <div class="search-wrap">
    <span class="search-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input class="search-input" type="text" placeholder="Cari catatan..." oninput="filterNotes(this.value)">
  </div>

  <div class="sidebar-meta">
    <span class="notes-count" id="notesCount">0 catatan</span>
    <div class="view-toggle">
      <button class="view-btn" id="btnList" onclick="setView('list')" title="List">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="view-btn" id="btnGrid" onclick="setView('grid')" title="Grid">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
    </div>
  </div>

  <div class="notes-list" id="notesList"></div>
</aside>

<!-- ══ EDITOR ══ -->
<main class="editor-area">

  <div class="welcome" id="welcomeScreen">
    <div class="welcome-art">📓</div>
    <h2>Mulai Menulis</h2>
    <p>Pilih catatan di kiri atau buat catatan baru.</p>
    <div class="welcome-shortcuts">
      <span class="shortcut-badge">Ctrl+N Baru</span>
      <span class="shortcut-badge">Ctrl+S Simpan</span>
      <span class="shortcut-badge">Ctrl+E Export PDF</span>
    </div>
  </div>

  <div id="editorPanel" style="display:none;flex:1;flex-direction:column;overflow:hidden;">

    <!-- Toolbar -->
    <div class="editor-toolbar">
      <span class="saved-badge" id="savedBadge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        Tersimpan
      </span>
      <div class="toolbar-spacer"></div>

      <select class="font-size-select" id="fontSizeSelect" onchange="applyFontSize(this.value)">
        <option value="small">Kecil</option>
        <option value="normal" selected>Normal</option>
        <option value="large">Besar</option>
        <option value="xlarge">Sangat Besar</option>
      </select>

      <div class="toolbar-sep"></div>

      <button class="btn-tool" id="btnBold"      onclick="fmt('bold')"                 title="Tebal (Ctrl+B)"><b style="font-size:.82rem">B</b></button>
      <button class="btn-tool" id="btnItalic"    onclick="fmt('italic')"               title="Miring (Ctrl+I)"><i style="font-size:.86rem;font-family:Georgia,serif">I</i></button>
      <button class="btn-tool" id="btnUnderline" onclick="fmt('underline')"            title="Garis bawah (Ctrl+U)"><u style="font-size:.82rem">U</u></button>

      <div class="toolbar-sep"></div>

      <button class="btn-tool" id="btnUL" onclick="fmt('insertUnorderedList')" title="Bullet list">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>
        List
      </button>
      <button class="btn-tool" id="btnOL" onclick="fmt('insertOrderedList')" title="Daftar bernomor">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
        Nomor
      </button>

      <div class="toolbar-sep"></div>

      <button class="btn-tool save"   onclick="saveNote()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Simpan
      </button>
      <button class="btn-tool export" id="btnExport" onclick="exportPDF()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        PDF
      </button>
      <button class="btn-tool danger" onclick="confirmDelete()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        Hapus
      </button>
    </div>

    <!-- Paper -->
    <div class="editor-content">
      <div class="editor-paper">
        <div class="paper-top">
          <textarea class="title-input" id="noteTitle" rows="1"
            placeholder="Judul catatan..."
            oninput="autoResize(this);onEditorChange()"></textarea>
          <div class="meta-row">
            <div class="meta-date">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Dibuat <span id="noteDate">—</span>
            </div>
            <div class="meta-date" id="noteModified" style="display:none;">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Diubah <span id="noteModifiedText">—</span>
            </div>
            <div class="tag-input-wrap" id="tagsContainer">
              <input class="tag-input" type="text" id="tagInput"
                placeholder="+ tag (Enter)" onkeydown="handleTagInput(event)">
            </div>
          </div>
        </div>
        <div class="lined-body-wrap">
          <div id="noteBody" contenteditable="true"
            data-placeholder="Tulis catatan kamu di sini..."
            spellcheck="false"
            oninput="onEditorChange();updateToolbarState()"
            onkeyup="updateToolbarState()"
            onmouseup="updateToolbarState()"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- ══ PDF TEMPLATE (hidden, always light/white) ══ -->
<div id="pdfContent">
  <div class="pdf-paper-top">
    <h1 id="pdfTitle"></h1>
    <div class="pdf-meta-row">
      <span class="pdf-meta-chip" id="pdfDate"></span>
      <span class="pdf-meta-chip" id="pdfModified" style="display:none"></span>
      <span id="pdfTags"></span>
    </div>
  </div>
  <div class="pdf-lined-wrap">
    <div class="pdf-body-text" id="pdfBody"></div>
  </div>
</div>

<!-- ══ DELETE MODAL ══ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <h3>Hapus Catatan?</h3>
    <p>Catatan ini akan dihapus permanen dan tidak bisa dikembalikan.</p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-confirm-delete" onclick="deleteNote()">Ya, Hapus</button>
    </div>
  </div>
</div>

<script>
/* ─── STATE ───────────────────────── */
let notes     = JSON.parse(localStorage.getItem('catatanku_v4') || '[]');
let currentId = null;
let saveTimer = null;
let searchQuery = '';
let viewMode  = localStorage.getItem('catatanView')  || 'list';
let theme     = localStorage.getItem('catatanTheme') || 'light';

/* ─── UTILS ───────────────────────── */
const $ = id => document.getElementById(id);
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2) }
function formatDate(ts){
  return new Date(ts).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
}
function formatDateTime(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})+
    ' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
function persist(){ localStorage.setItem('catatanku_v4',JSON.stringify(notes)) }
function autoResize(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px' }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function getBodyHTML(){ return $('noteBody').innerHTML }

/* ─── DARK MODE ───────────────────── */
function applyTheme(t){
  theme=t;
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('catatanTheme',t);
  const isDark = t==='dark';
  $('themeIcon').textContent  = isDark ? '☀️' : '🌙';
  $('themeLabel').textContent = isDark ? 'Siang' : 'Malam';
}
function toggleTheme(){
  applyTheme(theme==='light' ? 'dark' : 'light');
}

/* ─── FORMAT COMMANDS ─────────────── */
function fmt(cmd){
  $('noteBody').focus();
  document.execCommand(cmd,false,null);
  updateToolbarState(); onEditorChange();
}
function applyFontSize(size){
  $('noteBody').focus();
  const sizeMap={small:'0.85rem',normal:'1rem',large:'1.2rem',xlarge:'1.5rem'};
  const sel=window.getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed){
    $('noteBody').style.fontSize=sizeMap[size]||'1rem';
    $('noteBody').style.lineHeight='36px';
    onEditorChange(); return;
  }
  const range=sel.getRangeAt(0);
  const frag=range.extractContents();
  const span=document.createElement('span');
  span.dataset.size=size;
  span.style.fontSize=sizeMap[size]||'1rem';
  span.style.lineHeight='36px';
  span.appendChild(frag);
  range.insertNode(span);
  sel.removeAllRanges();
  const nr=document.createRange();
  nr.selectNodeContents(span);
  sel.addRange(nr);
  onEditorChange();
}
function updateToolbarState(){
  [['bold','btnBold'],['italic','btnItalic'],['underline','btnUnderline'],
   ['insertUnorderedList','btnUL'],['insertOrderedList','btnOL']].forEach(([c,id])=>{
    $(id).classList.toggle('active-fmt',document.queryCommandState(c));
  });
}

/* ─── VIEW TOGGLE ─────────────────── */
function setView(mode){
  viewMode=mode; localStorage.setItem('catatanView',mode);
  $('notesList').className='notes-list '+mode+'-mode';
  $('btnList').classList.toggle('active',mode==='list');
  $('btnGrid').classList.toggle('active',mode==='grid');
  renderList();
}

/* ─── RENDER SIDEBAR ──────────────── */
function renderList(){
  const list=$('notesList'), cEl=$('notesCount');
  let filtered=notes.filter(n=>
    !searchQuery||
    n.title.toLowerCase().includes(searchQuery)||
    n.body.replace(/<[^>]+>/g,'').toLowerCase().includes(searchQuery)||
    (n.tags||[]).some(t=>t.toLowerCase().includes(searchQuery))
  );
  filtered.sort((a,b)=>b.updatedAt-a.updatedAt);
  cEl.textContent=`${filtered.length} catatan`;
  if(!filtered.length){
    list.innerHTML=`<div class="empty-sidebar">${searchQuery?'🔍 Tidak ditemukan.':'📭 Belum ada catatan.<br>Yuk mulai menulis!'}</div>`;
    return;
  }
  const tagsH=tags=>(tags||[]).slice(0,2).map(t=>`<span class="note-item-tag">#${escHtml(t)}</span>`).join('');
  const strip=h=>{const d=document.createElement('div');d.innerHTML=h;return d.innerText||''};
  list.innerHTML=filtered.map(n=>`
    <div class="note-item ${n.id===currentId?'active':''}" onclick="openNote('${n.id}')">
      <div class="note-item-title">${escHtml(n.title)||'Tanpa Judul'}</div>
      <div class="note-item-preview">${escHtml(strip(n.body).replace(/\n/g,' '))}</div>
      ${tagsH(n.tags)}
      <div class="note-item-date">${formatDateTime(n.updatedAt)}</div>
    </div>`).join('');
}

/* ─── RENDER EDITOR ───────────────── */
function renderEditor(note){
  $('welcomeScreen').style.display='none';
  const panel=$('editorPanel');
  panel.style.display='flex'; panel.style.flexDirection='column';
  panel.style.flex='1'; panel.style.overflow='hidden';
  const tEl=$('noteTitle');
  tEl.value=note.title;
  setTimeout(()=>autoResize(tEl),10);
  $('noteDate').textContent=formatDate(note.createdAt);
  const mEl=$('noteModified');
  if(note.updatedAt!==note.createdAt){
    mEl.style.display='flex';
    $('noteModifiedText').textContent=formatDateTime(note.updatedAt);
  } else { mEl.style.display='none'; }
  $('noteBody').innerHTML=note.body||'';
  if(note.fontSize){
    $('noteBody').style.fontSize=note.fontSize;
    $('noteBody').style.lineHeight='36px';
    $('fontSizeSelect').value=note.fontSizeKey||'normal';
  } else {
    $('noteBody').style.fontSize='';
    $('noteBody').style.lineHeight='';
    $('fontSizeSelect').value='normal';
  }
  renderTags(note.tags||[]);
  $('savedBadge').classList.remove('show');
  $('noteBody').focus();
}

/* ─── TAGS ────────────────────────── */
function renderTags(tags){
  const c=$('tagsContainer'), inp=$('tagInput');
  c.querySelectorAll('.tag').forEach(el=>el.remove());
  tags.forEach(tag=>{
    const el=document.createElement('span'); el.className='tag';
    el.innerHTML=`#${escHtml(tag)} <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    el.onclick=()=>removeTag(tag);
    c.insertBefore(el,inp);
  });
}
function handleTagInput(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const val=e.target.value.trim().replace(/[,#\s]/g,'');
    if(!val||!currentId){e.target.value='';return;}
    const note=notes.find(n=>n.id===currentId);
    if(!note.tags) note.tags=[];
    if(!note.tags.includes(val)){note.tags.push(val);persist();renderTags(note.tags);}
    e.target.value='';
  }
}
function removeTag(tag){
  if(!currentId) return;
  const note=notes.find(n=>n.id===currentId);
  if(!note) return;
  note.tags=(note.tags||[]).filter(t=>t!==tag);
  persist(); renderTags(note.tags);
}

/* ─── CRUD ────────────────────────── */
function createNote(){
  const note={id:genId(),title:'',body:'',tags:[],fontSize:'',fontSizeKey:'normal',
    createdAt:Date.now(),updatedAt:Date.now()};
  notes.unshift(note); persist();
  currentId=note.id; renderList(); renderEditor(note);
  $('noteTitle').focus();
}
function openNote(id){
  currentId=id;
  const note=notes.find(n=>n.id===id);
  if(!note) return;
  renderList(); renderEditor(note);
}
function onEditorChange(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveNote,1800);
}
function saveNote(){
  if(!currentId) return;
  const note=notes.find(n=>n.id===currentId);
  if(!note) return;
  note.title=$('noteTitle').value;
  note.body=getBodyHTML();
  note.fontSize=$('noteBody').style.fontSize;
  note.fontSizeKey=$('fontSizeSelect').value;
  note.updatedAt=Date.now();
  persist(); renderList();
  $('noteModified').style.display='flex';
  $('noteModifiedText').textContent=formatDateTime(note.updatedAt);
  $('savedBadge').classList.add('show');
  setTimeout(()=>$('savedBadge').classList.remove('show'),2600);
}
function confirmDelete(){ $('deleteModal').classList.add('open') }
function closeModal()   { $('deleteModal').classList.remove('open') }
function deleteNote(){
  notes=notes.filter(n=>n.id!==currentId);
  persist(); currentId=null; closeModal(); renderList();
  $('editorPanel').style.display='none';
  $('welcomeScreen').style.display='flex';
}
function filterNotes(q){ searchQuery=q.toLowerCase().trim(); renderList() }

/* ─── EXPORT PDF ──────────────────── */
function exportPDF(){
  if(!currentId) return;
  saveNote();
  const note=notes.find(n=>n.id===currentId);
  if(!note) return;

  // Populate PDF template
  $('pdfTitle').textContent=note.title||'Tanpa Judul';
  $('pdfDate').textContent='Dibuat: '+formatDate(note.createdAt);
  const modEl=$('pdfModified');
  if(note.updatedAt!==note.createdAt){
    modEl.style.display='inline-block';
    modEl.textContent='Diubah: '+formatDateTime(note.updatedAt);
  } else { modEl.style.display='none'; }
  $('pdfTags').innerHTML=(note.tags||[]).map(t=>`<span class="pdf-tag">#${escHtml(t)}</span>`).join(' ');
  $('pdfBody').innerHTML=note.body||'';
  // Apply font size to pdf body
  if(note.fontSize){
    $('pdfBody').style.fontSize=note.fontSize;
    $('pdfBody').style.lineHeight='36px';
  } else {
    $('pdfBody').style.fontSize='13px';
    $('pdfBody').style.lineHeight='36px';
  }

  const el=$('pdfContent');
  el.style.display='block';

  const filename=(note.title||'catatan')
    .replace(/[^a-zA-Z0-9\s]/g,'').trim().replace(/\s+/g,'_')||'catatan';
  const btn=$('btnExport');
  btn.disabled=true;
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Menyiapkan...`;

  html2pdf().set({
    margin:0,
    filename:filename+'.pdf',
    image:{type:'jpeg',quality:.98},
    html2canvas:{
      scale:2,
      useCORS:true,
      logging:false,
      width:794,        /* exactly A4 width at 96dpi */
      windowWidth:794
    },
    jsPDF:{unit:'px',format:[794,1123],orientation:'portrait'},
    pagebreak:{mode:['avoid-all','css']}
  }).from(el).save().then(()=>{
    el.style.display='none';
    btn.disabled=false;
    btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> PDF`;
  });
}

/* ─── KEYBOARD SHORTCUTS ──────────── */
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveNote()}
  if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();createNote()}
  if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault();exportPDF()}
  if(e.key==='Escape') closeModal();
});

/* ─── INIT ────────────────────────── */
document.execCommand('defaultParagraphSeparator',false,'p');
applyTheme(theme);
setView(viewMode);
renderList();
</script>
</body>
</html>
